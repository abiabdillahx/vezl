services:
  vezl:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://vezl:vezl@db:5432/vezl
      SESSION_SECRET: change-me-min-32-chars-please
      ADMIN_EMAIL: admin@example.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vezl
      POSTGRES_PASSWORD: vezl
      POSTGRES_DB: vezl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vezl']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
